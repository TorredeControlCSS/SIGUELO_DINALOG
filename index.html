<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGUELO | Portal Central DINALOG</title>
<link rel="icon" href="https://torredecontrolcss.github.io/SIGUELO_DINALOG/favicon.ico">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ececec;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #333;
  }
  .header {
    background: #0C447C;
    color: #fff;
    padding: 14px 28px;
    border-bottom: 3px solid #1e5a9e;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .logo {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: .3px; }
  .header p { font-size: 12px; color: #b9d2ec; margin-top: 3px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding: 22px 28px;
  }
  .card {
    background: #fff;
    border: 1px solid #a8a8a8;
    border-radius: 2px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: border-color .12s, box-shadow .12s;
  }
  .card:hover {
    border-color: #1e5a9e;
    box-shadow: 0 1px 4px rgba(30,90,158,.25);
  }
  .card .sistema {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #888;
    margin-bottom: 6px;
  }
  .card h2 { font-size: 15px; font-weight: 600; color: #1e5a9e; margin-bottom: 6px; }
  .card p  { font-size: 12px; color: #555; line-height: 1.4; flex: 1; }
  .card .link {
    font-size: 11px;
    color: #999;
    margin-top: 10px;
    word-break: break-all;
    border-top: 1px solid #ececec;
    padding-top: 8px;
  }
  .footer {
    padding: 16px 28px;
    font-size: 11px;
    color: #888;
    border-top: 1px solid #a8a8a8;
    background: #fff;
  }
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="https://torredecontrolcss.github.io/SIGUELO_DINALOG/icons/icon-192.png" alt="CSS Panam&aacute;">
  <div>
  <h1>SIGUELO: Sistema Integrado de Gestión Unificada y Evaluación Logística &mdash; Portal Central DINALOG</h1>
  <p>DINALOG / CEDIS Panam&aacute; &middot; Acceso a sistemas y tableros</p>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  Enlaces a GitHub Pages (org: TorredeControlCSS). Cada tarjeta abre una p&aacute;gina en pesta&ntilde;a nueva.
</div>

<script>
const PAGINAS = [
  { sistema:"Asignaci&oacute;n F8", nombre:"Motor de Asignaci&oacute;n de Inventario",
    desc:"Asignaci&oacute;n de Requisiciones F8 con Modelo con Inteligencia de Demanda + Prioridad Cl&iacute;nica + Desabastecimiento en UE",
    url:"https://torredecontrolcss.github.io/ASIGNACION_F8/" },
  { sistema:"Asignaci&oacute;n F8", nombre:"Confirmaci&oacute;n de Recepci&oacute;n de F8",
    desc:"M&oacute;dulo de Confirmaci&oacute;n de Formas 8 en Ventanilla del Almac&eacute;n.",
    url:"https://torredecontrolcss.github.io/ASIGNACION_F8/confirmacion_f8.html" },
  { sistema:"Asignaci&oacute;n F8", nombre:"Panel de Despacho de F8 a Unidades Ejecutoras",
    desc:"Panel de despacho por triage, calendario, OTIF, termograf&iacute;a de Atenci&oacute;n por llenado de Unidad Ejecutora.",
    url:"https://torredecontrolcss.github.io/ASIGNACION_F8/panel_despacho.html" },

  { sistema:"S&Iacute;GUELO", nombre:"Solicitud de Cita",
    desc:"Solicitud de citas de proveedores.",
    url:"https://torredecontrolcss.github.io/SIGUELO/solicitud_cita.html" },
  { sistema:"S&Iacute;GUELO", nombre:"Panel de Confirmaci&oacute;n",
    desc:"Confirmaci&oacute;n de citas de proveedores.",
    url:"https://torredecontrolcss.github.io/SIGUELO/panel_confirmacion.html" },

  { sistema:"Reposici&oacute;n UE", nombre:"Tablero de Cobertura y Reposición de Inventario",
    desc:"An&aacute;lisis Comparativo de Tr&aacute;nsitos, Consumos, F8 y Distribuciones",
    url:"https://torredecontrolcss.github.io/REPOSICION_UE_CSS/simulador_reposicion.html" },
  { sistema:"Reposici&oacute;n UE", nombre:"Reposici&oacute;n UE",
    desc:"Calculadora de Reposición de Inventario para las Unidades Ejecutoras.",
    url:"https://torredecontrolcss.github.io/REPOSICION_UE_CSS/reposicion_ue.html" },

  { sistema:"Seguire", nombre:"M&oacute;dulo de Seguimiento de Solicitudes de Entrega y &Oacute;rdenes de Compra",
    desc:"Sistema de Seguimiento Inteligente de Requisiciones (Piloto).",
    url:"https://torredecontrolcss.github.io/seguire/" },
  { sistema:"Seguire", nombre:"Tr&aacute;nsitos de &Oacute;rdenes de Compra",
    desc:"M&oacute;dulo de Captura Inteligente de &Oacute;rdenes de Compra y Solicitudes de Entregas Generadas.",
    url:"https://torredecontrolcss.github.io/seguire/transitos.html" },

  { sistema:"Recursos Humanos", nombre:"An&aacute;lisis de Tiempos",
    desc:"An&aacute;lisis Completo de tiempos, ausencias, tardanzas, TxT, Alimentaci&oacute;n y Transporte del personal de DINALOG.",
    url:"https://torredecontrolcss.github.io/RH_BIOMETRICO/" },

  { sistema:"Recursos Humanos", nombre:"Mis Tiempos",
    desc:"Portal de tiempos (Piloto en prueba).",
    url:"https://torredecontrolcss.github.io/Dashboard_Pedidos-_F8v2/mis_tiempos.html" },

  { sistema:"Mi Farma Digital", nombre:"Mi Farma Digital &mdash; Versi&oacute;n DINALOG",
    desc:"Piloto de prueba creado por DINALOG. Geolocaliza medicamentos por per&iacute;metro mediante f&oacute;rmula de Haversine; acota la b&uacute;squeda por per&iacute;metro, provincia y pa&iacute;s.",
    url:"https://torredecontrolcss.github.io/mifarmadigital/" },

  { sistema:"Curvas de Inventario", nombre:"Curvas de Inventario",
    desc:"An&aacute;lisis hist&oacute;rico de las Curvas de Inventario por Rengl&oacute;n, Evaluaci&oacute;n de Planificadores por criterio ABC XYZ y Reportes de Abastecimiento y Vencimiento Autom&aacute;ticos.",
    url:"https://torredecontrolcss.github.io/Curvas_de_Inventario/" },

  { sistema:"Pantalla de Turnos", nombre:"Pantalla de Turnos",
    desc:"Piloto de Prueba para un sistema de atenci&oacute;n por turnos en el almac&eacute;n y ventanillas.",
    url:"https://torredecontrolcss.github.io/Pantalla_de_Turnos/" }
];

const grid = document.getElementById("grid");

PAGINAS.forEach(p => {
  const a = document.createElement("a");
  a.className = "card";
  a.href = p.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.innerHTML =
    '<div class="sistema">'+p.sistema+'</div>' +
    '<h2>'+p.nombre+'</h2>' +
    '<p>'+p.desc+'</p>' +
    '<div class="link">'+p.url+'</div>';
  grid.appendChild(a);
});
</script>

</body>
</html>
